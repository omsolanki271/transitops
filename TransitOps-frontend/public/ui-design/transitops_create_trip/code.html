<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TransitOps - Create Trip</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "outline": "#727785",
                        "on-tertiary-container": "#fcfcff",
                        "on-primary-fixed": "#001a42",
                        "on-surface-variant": "#424754",
                        "outline-variant": "#c2c6d6",
                        "tertiary-container": "#007cb1",
                        "secondary": "#006b5f",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#d9e3f6",
                        "primary-fixed": "#d8e2ff",
                        "primary-container": "#2170e4",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#006f64",
                        "on-surface": "#121c2a",
                        "surface-container-low": "#eff4ff",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "tertiary-fixed-dim": "#89ceff",
                        "background": "#f8f9ff",
                        "surface-container-high": "#dee9fc",
                        "secondary-container": "#6df5e1",
                        "tertiary": "#00628d",
                        "surface-container-highest": "#d9e3f6",
                        "tertiary-fixed": "#c9e6ff",
                        "on-secondary-fixed-variant": "#005048",
                        "on-primary-fixed-variant": "#004395",
                        "on-background": "#121c2a",
                        "secondary-fixed": "#71f8e4",
                        "surface-tint": "#005ac2",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-bright": "#f8f9ff",
                        "primary-fixed-dim": "#adc6ff",
                        "surface-dim": "#d0dbed",
                        "on-tertiary-fixed": "#001e2f",
                        "surface-container": "#e6eeff",
                        "secondary-fixed-dim": "#4fdbc8",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "primary": "#0058be",
                        "surface": "#f8f9ff",
                        "inverse-surface": "#27313f",
                        "on-secondary-fixed": "#00201c",
                        "inverse-primary": "#adc6ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "2rem",
                        "base": "4px",
                        "container-margin": "24px",
                        "gutter": "16px",
                        "md": "1.5rem",
                        "sm": "1rem",
                        "xl": "3rem",
                        "xs": "0.5rem"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "code": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "code": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "500" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .input-glow:focus { box-shadow: 0 0 0 3px rgba(33, 112, 228, 0.3); border-color: #2170e4; outline: none; }
        .btn-glow { box-shadow: 0 4px 14px 0 rgba(33, 112, 228, 0.39); }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(33, 112, 228, 0.23); }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4 md:p-lg">
<!-- Main Modal/Page Container -->
<main class="w-full max-w-4xl glass-panel rounded-xl shadow-lg flex flex-col overflow-hidden">
<!-- Header -->
<header class="px-lg py-md border-b border-outline-variant/20 flex items-center justify-between bg-surface-container-lowest">
<div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Create Trip</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Configure logistics details for new dispatch.</p>
</div>
<button aria-label="Close" class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-variant/20">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Form Content -->
<form class="p-lg flex-grow overflow-y-auto custom-scrollbar">
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Routing Section -->
<section class="space-y-md">
<h2 class="font-headline-md text-headline-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary">route</span> Routing
                    </h2>
<div class="space-y-4 relative">
<div class="absolute left-[15px] top-[40px] bottom-[40px] w-[2px] bg-outline-variant/30 z-0"></div>
<!-- Source Address -->
<div class="relative z-10">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="source_address">Source Address</label>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high border-2 border-primary flex items-center justify-center flex-shrink-0">
<div class="w-3 h-3 rounded-full bg-primary"></div>
</div>
<div class="flex-grow">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface input-glow transition-all" id="source_address" placeholder="Enter starting location" type="text" value="Warehouse A, Sector 4"/>
</div>
</div>
</div>
<!-- Destination Address -->
<div class="relative z-10">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="dest_address">Destination Address</label>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high border-2 border-error flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-error text-[16px]">location_on</span>
</div>
<div class="flex-grow">
<input class="w-full bg-error-container border border-error rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface input-glow transition-all" id="dest_address" placeholder="Enter final destination" type="text"/>
<p class="font-body-md text-body-md text-error mt-1 flex items-center gap-1 text-sm">
<span class="material-symbols-outlined text-[16px]">error</span> Destination is required for dispatch routing.
                                    </p>
</div>
</div>
</div>
</div>
<div class="flex gap-4 pt-4 border-t border-outline-variant/20">
<div class="flex-1">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="distance">Est. Distance (km)</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface input-glow transition-all" id="distance" placeholder="0.0" type="number"/>
</div>
<div class="flex-1">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="revenue">Expected Revenue ($)</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface input-glow transition-all" id="revenue" placeholder="0.00" type="number"/>
</div>
</div>
</section>
<!-- Resources Section -->
<section class="space-y-md">
<h2 class="font-headline-md text-headline-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary">local_shipping</span> Resources
                    </h2>
<!-- Vehicle Selection -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="vehicle">Assigned Vehicle</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 pr-10 font-body-md text-body-md text-on-surface input-glow transition-all" id="vehicle">
<option disabled="" selected="" value="">Select a vehicle</option>
<option value="v1">Volvo FH16 (TRK-001) - Available</option>
<option value="v2">Scania R500 (TRK-002) - Maintenance</option>
<option value="v3">Mercedes Actros (TRK-003) - Available</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
<div class="mt-2 flex items-center gap-2">
<span class="inline-flex items-center gap-1.5 px-2 py-1 rounded bg-secondary-container/20 text-secondary font-label-md text-label-md text-xs">
<span class="w-2 h-2 rounded-full bg-secondary"></span> Available
                            </span>
</div>
</div>
<!-- Driver Selection -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="driver">Assigned Driver</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 pr-10 font-body-md text-body-md text-on-surface input-glow transition-all" id="driver">
<option disabled="" selected="" value="">Select a driver</option>
<option value="d1">Sarah Jenkins - Rested</option>
<option value="d2">Marcus Chen - On Duty</option>
<option value="d3">Elena Rodriguez - Rested</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Cargo Weight -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="cargo">Cargo Weight (kg)</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 pl-10 font-body-md text-body-md text-on-surface input-glow transition-all" id="cargo" placeholder="Enter total weight" type="number"/>
<div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
<span class="material-symbols-outlined text-outline">scale</span>
</div>
</div>
</div>
</section>
</div>
</form>
<!-- Footer Actions -->
<footer class="px-lg py-4 border-t border-outline-variant/20 bg-surface-container-lowest flex justify-end gap-4 items-center">
<button class="px-6 py-3 rounded-lg font-label-md text-label-md text-on-surface-variant hover:bg-surface-variant/50 transition-colors" type="button">
                Cancel
            </button>
<button class="px-8 py-3 rounded-lg font-label-md text-label-md text-on-primary bg-primary btn-glow transition-all flex items-center gap-2" type="button">
<span class="material-symbols-outlined">send</span> Dispatch Trip
            </button>
</footer>
</main>
</body></html>
